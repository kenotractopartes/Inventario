# ============================================================
# NETLIFY — solo para las funciones que hablan con Leadway
# ============================================================
# La página del inventario NO se publica aquí: sigue viviendo en
# GitHub Pages (fotonas.tractopartes.com). Netlify solo hospeda la
# piecita que guarda el token de Leadway y hace las llamadas a su API.
#
# El token NUNCA va en el código. Se pone en Netlify:
#   Site configuration → Environment variables
#     LEADWAY_TOKEN        = el token del portal de Leadway (marcado como secreto)
#     LEADWAY_LOCATION_ID  = el id de la cuenta de Leadway
#     FIREBASE_API_KEY     = la del inventario (es pública, no es secreta)
#     EMAILS_PERMITIDOS    = correos que pueden usarla, separados por coma
# ============================================================

[build]
  # Carpeta con una página vacía: no queremos publicar el inventario aquí.
  publish = "netlify_publico"
  functions = "netlify/functions"
  command = "echo 'sin build: solo funciones'"

  [build.environment]
    # Netlify revisa que los valores de las variables no anden sueltos por el
    # repo, y tumba el deploy si los encuentra. Estos TRES sí están a la vista
    # a propósito y no son secretos:
    #   FIREBASE_API_KEY    → Firebase la publica en el HTML por diseño; lo que
    #                         protege la base son sus reglas, no esconder la llave.
    #   EMAILS_PERMITIDOS   → el correo de acceso ya sale en la pantalla de login.
    #   LEADWAY_LOCATION_ID → es el id de la cuenta, sale en la URL del portal.
    # LEADWAY_TOKEN NO se omite NUNCA: ese sí es secreto de verdad y queremos
    # que Netlify siga vigilando que no se nos escape al repo.
    SECRETS_SCAN_OMIT_KEYS = "FIREBASE_API_KEY,EMAILS_PERMITIDOS,LEADWAY_LOCATION_ID"

    # Netlify tiene un SEGUNDO guardia que caza cualquier texto con pinta de
    # llave de Google ("AIza..."), aunque no sea ninguna variable declarada.
    # En index.html hay dos, las dos públicas a propósito: la del inventario y
    # la de Maura (de ahí lee sus ventas). Se omiten esas DOS exactas y nada
    # más, para que el guardia siga vigilando por si algún día se nos escapa
    # una llave de verdad. NO se apaga la detección completa.
    SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIzaSyB8MRNvbAhk7tJa731DolvnnFr_1S9imLk,AIzaSyAzr0B8M-8PeJwK0XAaHDapyLPzsvmTThY"

[functions]
  node_bundler = "esbuild"
